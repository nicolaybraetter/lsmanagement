version: '3.8'

services:
  backend:
    image: lsmanagement-backend
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/lsmanagement.db
      - ADMIN_PASSWORD=matrixreloaded
      # SMTP — optional, or configure via Admin Panel
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=dein@gmail.com
      # - SMTP_PASSWORD=dein-app-passwort
      # - SMTP_FROM=dein@gmail.com
      # - OPERATOR_EMAIL=empfaenger@domain.de
    deploy:
      placement:
        constraints:
          - node.hostname == swarm01

  frontend:
    image: lsmanagement-frontend
    ports:
      - target: 80
        published: 5173
        mode: host
    deploy:
      placement:
        constraints:
          - node.hostname == swarm01

volumes:
  db_data:
