version: '3.8'

services:
  backend:
    image: lsmanagement-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - db_data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/lsmanagement.db
    restart: unless-stopped
    networks:
      - lsm
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: lsmanagement-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/nginx-standalone.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lsm

networks:
  lsm:
    driver: bridge

volumes:
  db_data:
    driver: local
