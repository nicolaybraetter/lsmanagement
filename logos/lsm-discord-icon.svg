<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="cabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner border glow -->
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Ground / shadow -->
  <ellipse cx="255" cy="395" rx="195" ry="10" fill="#052e16" fill-opacity="0.5"/>

  <!-- === REAR WHEEL === -->
  <circle cx="170" cy="270" r="92" fill="#021a0e" stroke="#4ade80" stroke-width="11"/>
  <!-- inner ring -->
  <circle cx="170" cy="270" r="58" fill="none" stroke="#4ade80" stroke-width="7" stroke-opacity="0.7"/>
  <!-- spokes (8) -->
  <line x1="170" y1="178" x2="170" y2="362" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="78"  y1="270" x2="262" y2="270" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="105" y1="205" x2="235" y2="335" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="235" y1="205" x2="105" y2="335" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- lug bolts around rim -->
  <circle cx="170" cy="182" r="5" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="170" cy="358" r="5" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="82"  cy="270" r="5" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="258" cy="270" r="5" fill="#4ade80" fill-opacity="0.6"/>
  <!-- center hub -->
  <circle cx="170" cy="270" r="20" fill="#4ade80" filter="url(#glow)"/>
  <circle cx="170" cy="270" r="10" fill="#052e16"/>

  <!-- === FENDER over rear wheel === -->
  <path d="M88 200 Q170 152 252 200" stroke="#22c55e" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M88 200 Q170 152 252 200" stroke="#4ade80" stroke-width="5" fill="none" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- === TRACTOR BODY / FRAME === -->
  <!-- Main body block -->
  <rect x="170" y="196" width="198" height="78" rx="10" fill="url(#bodyGrad)"/>
  <!-- Hood (engine section lower) -->
  <rect x="170" y="208" width="108" height="66" rx="8" fill="#15803d"/>
  <!-- Hood top highlight -->
  <rect x="170" y="208" width="108" height="10" rx="8" fill="#22c55e" fill-opacity="0.5"/>
  <!-- Body side panel -->
  <rect x="278" y="225" width="90" height="49" rx="6" fill="#166534"/>

  <!-- === CAB === -->
  <!-- Cab main body -->
  <rect x="280" y="128" width="118" height="110" rx="12" fill="url(#cabGrad)"/>
  <!-- Cab roof highlight -->
  <rect x="280" y="128" width="118" height="14" rx="12" fill="#86efac" fill-opacity="0.4"/>
  <!-- Cab window (front) -->
  <rect x="295" y="146" width="88" height="66" rx="7" fill="#d1fae5" fill-opacity="0.55"/>
  <!-- Window glare -->
  <rect x="299" y="150" width="28" height="10" rx="3" fill="white" fill-opacity="0.3"/>
  <!-- Cab bottom connector to body -->
  <rect x="280" y="225" width="90" height="38" fill="#16a34a"/>

  <!-- === EXHAUST PIPE === -->
  <rect x="246" y="96" width="16" height="72" rx="8" fill="#86efac"/>
  <rect x="244" y="94" width="20" height="10" rx="4" fill="#4ade80"/>
  <!-- Exhaust puffs -->
  <circle cx="254" cy="86" r="11" fill="#86efac" fill-opacity="0.45"/>
  <circle cx="264" cy="73" r="8"  fill="#86efac" fill-opacity="0.28"/>
  <circle cx="250" cy="62" r="6"  fill="#86efac" fill-opacity="0.15"/>

  <!-- === FRONT WHEEL (small) === -->
  <circle cx="370" cy="305" r="54" fill="#021a0e" stroke="#4ade80" stroke-width="9"/>
  <circle cx="370" cy="305" r="32" fill="none" stroke="#4ade80" stroke-width="6" stroke-opacity="0.7"/>
  <!-- front wheel spokes (4) -->
  <line x1="370" y1="251" x2="370" y2="359" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="316" y1="305" x2="424" y2="305" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- center hub -->
  <circle cx="370" cy="305" r="14" fill="#4ade80" filter="url(#glow)"/>
  <circle cx="370" cy="305" r="7"  fill="#052e16"/>

  <!-- === STEP / FOOTBOARD === -->
  <rect x="282" y="260" width="28" height="12" rx="3" fill="#4ade80" fill-opacity="0.6"/>
  <rect x="282" y="272" width="28" height="4"  rx="2" fill="#4ade80" fill-opacity="0.3"/>

  <!-- === HEADLIGHT === -->
  <rect x="160" y="215" width="18" height="12" rx="4" fill="#fde68a"/>
  <rect x="160" y="215" width="18" height="12" rx="4" fill="#fbbf24" fill-opacity="0.3"/>

  <!-- === "LSM" TEXT === -->
  <text x="256" y="478"
        font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
        font-size="54"
        font-weight="900"
        fill="#4ade80"
        text-anchor="middle"
        letter-spacing="10"
        filter="url(#glow)">LSM</text>
</svg>
