<svg width="512" height="560" viewBox="0 0 512 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="bodyS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="cabS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="560" rx="32" fill="url(#bgS)"/>
  <rect x="4" y="4" width="504" height="552" rx="29" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="512" height="52" rx="32" fill="#052e16" fill-opacity="0.5"/>
  <rect x="0" y="26" width="512" height="26" fill="#052e16" fill-opacity="0.5"/>
  <text x="256" y="34"
        font-family="Arial, Helvetica Neue, sans-serif"
        font-size="13"
        font-weight="700"
        fill="#86efac"
        fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="4">FARMING SIMULATOR COMMUNITY</text>

  <!-- === TRACTOR (centered, larger) === -->

  <!-- Ground shadow -->
  <ellipse cx="258" cy="418" rx="185" ry="10" fill="#021a0e" fill-opacity="0.5"/>

  <!-- Rear wheel (large) -->
  <circle cx="180" cy="295" r="98" fill="#021a0e" stroke="#4ade80" stroke-width="11"/>
  <circle cx="180" cy="295" r="62" fill="none" stroke="#4ade80" stroke-width="7" stroke-opacity="0.7"/>
  <!-- spokes (8) -->
  <line x1="180" y1="197" x2="180" y2="393" stroke="#4ade80" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="82"  y1="295" x2="278" y2="295" stroke="#4ade80" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="111" y1="226" x2="249" y2="364" stroke="#4ade80" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="249" y1="226" x2="111" y2="364" stroke="#4ade80" stroke-width="6.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- lug bolts -->
  <circle cx="180" cy="200" r="6" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="180" cy="390" r="6" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="83"  cy="295" r="6" fill="#4ade80" fill-opacity="0.6"/>
  <circle cx="277" cy="295" r="6" fill="#4ade80" fill-opacity="0.6"/>
  <!-- center hub -->
  <circle cx="180" cy="295" r="22" fill="#4ade80" filter="url(#glowS)"/>
  <circle cx="180" cy="295" r="11" fill="#052e16"/>

  <!-- Fender -->
  <path d="M96 220 Q180 172 264 220" stroke="#22c55e" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M96 220 Q180 172 264 220" stroke="#86efac" stroke-width="5"  fill="none" stroke-linecap="round" stroke-opacity="0.3"/>

  <!-- Body frame -->
  <rect x="180" y="218" width="204" height="82" rx="10" fill="url(#bodyS)"/>
  <!-- Hood section -->
  <rect x="180" y="230" width="116" height="70" rx="8" fill="#15803d"/>
  <!-- Hood highlight -->
  <rect x="180" y="230" width="116" height="12" rx="8" fill="#22c55e" fill-opacity="0.4"/>
  <!-- Side panel -->
  <rect x="296" y="246" width="88" height="54" rx="6" fill="#166534"/>

  <!-- Cab -->
  <rect x="292" y="145" width="124" height="118" rx="12" fill="url(#cabS)"/>
  <rect x="292" y="145" width="124" height="15" rx="12" fill="#86efac" fill-opacity="0.35"/>
  <!-- Window -->
  <rect x="308" y="162" width="93" height="70" rx="7" fill="#d1fae5" fill-opacity="0.55"/>
  <!-- Glare -->
  <rect x="313" y="167" width="30" height="11" rx="3" fill="white" fill-opacity="0.28"/>
  <!-- Cab bottom -->
  <rect x="292" y="246" width="88" height="42" fill="#16a34a"/>

  <!-- Exhaust -->
  <rect x="256" y="110" width="16" height="76" rx="8" fill="#86efac"/>
  <rect x="254" y="108" width="20" height="10" rx="4" fill="#4ade80"/>
  <!-- puffs -->
  <circle cx="264" cy="100" r="12" fill="#86efac" fill-opacity="0.4"/>
  <circle cx="275" cy="86"  r="9"  fill="#86efac" fill-opacity="0.25"/>
  <circle cx="260" cy="74"  r="7"  fill="#86efac" fill-opacity="0.14"/>

  <!-- Front wheel (small) -->
  <circle cx="382" cy="330" r="58" fill="#021a0e" stroke="#4ade80" stroke-width="10"/>
  <circle cx="382" cy="330" r="35" fill="none" stroke="#4ade80" stroke-width="6" stroke-opacity="0.7"/>
  <!-- spokes -->
  <line x1="382" y1="272" x2="382" y2="388" stroke="#4ade80" stroke-width="5.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="324" y1="330" x2="440" y2="330" stroke="#4ade80" stroke-width="5.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- hub -->
  <circle cx="382" cy="330" r="15" fill="#4ade80" filter="url(#glowS)"/>
  <circle cx="382" cy="330" r="7"  fill="#052e16"/>

  <!-- Step -->
  <rect x="294" y="282" width="30" height="13" rx="3" fill="#4ade80" fill-opacity="0.55"/>
  <rect x="294" y="295" width="30" height="5"  rx="2" fill="#4ade80" fill-opacity="0.28"/>

  <!-- Headlight -->
  <rect x="170" y="238" width="18" height="12" rx="4" fill="#fde68a"/>
  <circle cx="179" cy="244" r="4" fill="#fbbf24" fill-opacity="0.5"/>

  <!-- Separator line -->
  <line x1="40" y1="438" x2="472" y2="438" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Main brand text -->
  <text x="256" y="492"
        font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
        font-size="62"
        font-weight="900"
        fill="#4ade80"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#glowS)">LSM</text>

  <!-- Tagline -->
  <text x="256" y="524"
        font-family="Arial, Helvetica Neue, sans-serif"
        font-size="15"
        fill="#86efac"
        fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="1.5">MANAGEMENT</text>

  <!-- Bottom domain -->
  <text x="256" y="548"
        font-family="Arial, Helvetica Neue, sans-serif"
        font-size="11"
        fill="#86efac"
        fill-opacity="0.4"
        text-anchor="middle"
        letter-spacing="0.5">lscomm.braetter-int.de</text>
</svg>
